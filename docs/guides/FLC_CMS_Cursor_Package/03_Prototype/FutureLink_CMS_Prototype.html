<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Link CMS — Commercial Management Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;450;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Brand (sampled from FLC logo) */
  --flc-blue:#005BA4;        /* primary */
  --flc-blue-700:#01457c;
  --flc-blue-800:#02335c;
  --flc-blue-900:#062a48;
  --flc-sky:#2284C5;         /* secondary / globe */
  --flc-sky-200:#cfe6f5;
  --flc-sky-50:#eef6fc;
  --flc-red:#ED1B24;         /* critical / action accent — used sparingly */
  --flc-red-700:#c4131b;
  /* Neutrals (cool) */
  --ink:#0e1b2a;
  --slate:#334a61;
  --muted:#647d96;
  --line:#e3eaf1;
  --line-2:#eef2f6;
  --bg:#f4f7fa;
  --surface:#ffffff;
  --surface-2:#fbfcfe;
  /* States */
  --green:#1f9d63; --green-bg:#e7f6ee;
  --amber:#c98a00; --amber-bg:#fdf3dc;
  --violet:#6b4cc4; --violet-bg:#efeafa;
  --teal:#0f8a8a; --teal-bg:#e2f4f4;
  /* Type */
  --d:'Sora',system-ui,sans-serif;
  --b:'Inter',system-ui,sans-serif;
  --m:'IBM Plex Mono',ui-monospace,monospace;
  /* Geometry */
  --r:10px; --r-sm:7px; --r-lg:16px;
  --sb:264px; --hd:60px;
  --sh-1:0 1px 2px rgba(6,42,72,.06),0 1px 3px rgba(6,42,72,.05);
  --sh-2:0 4px 14px rgba(6,42,72,.08);
  --sh-3:0 18px 48px rgba(6,42,72,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--b);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--flc-sky-200);color:var(--flc-blue-900)}
.mono{font-family:var(--m);font-variant-numeric:tabular-nums}
h1,h2,h3,h4{font-family:var(--d);font-weight:700;letter-spacing:-.01em;color:var(--ink)}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sb);flex:0 0 var(--sb);background:linear-gradient(180deg,#02335c 0%,#062a48 100%);color:#cfe0ee;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:60;transition:transform .25s ease}
.sb-brand{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-brand .logo-chip{background:#fff;border-radius:9px;padding:7px 9px;display:flex;align-items:center;box-shadow:var(--sh-1)}
.sb-brand .logo-chip img{height:30px;display:block}
.sb-brand .sub{font-family:var(--d);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--flc-sky);font-weight:600;margin-top:2px}
.sb-brand .ttl{font-family:var(--d);font-size:13px;font-weight:700;color:#fff;line-height:1.1}
.sb-scroll{overflow-y:auto;flex:1;padding:10px 10px 24px}
.sb-scroll::-webkit-scrollbar{width:7px}.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:4px}
.nav-grp{margin-top:14px}
.nav-grp-t{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#6f8eaa;font-weight:600;padding:0 12px 6px}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:#bcd0e3;font-weight:500;font-size:13.5px;position:relative;transition:background .14s,color .14s}
.nav-i:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-i.active{background:linear-gradient(90deg,rgba(34,132,197,.28),rgba(34,132,197,.06));color:#fff}
.nav-i.active::before{content:"";position:absolute;left:-10px;top:7px;bottom:7px;width:3px;border-radius:0 3px 3px 0;background:var(--flc-sky)}
.nav-i .ic{width:18px;height:18px;flex:0 0 18px;opacity:.92}
.nav-i .badge{margin-left:auto;background:var(--flc-red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:var(--m)}
.nav-i .badge.soft{background:rgba(34,132,197,.3);color:#dcebf7}

/* ---------- Main ---------- */
.main{margin-left:var(--sb);flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:var(--hd);background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:0 22px}
.tb-burger{display:none}
.crumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
.crumb b{color:var(--ink);font-weight:600}
.crumb .sep{opacity:.45}
.tb-search{margin-left:8px;flex:1;max-width:340px;position:relative}
.tb-search input{width:100%;height:36px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);padding:0 12px 0 34px;font-family:var(--b);font-size:13px;color:var(--ink)}
.tb-search input:focus{outline:none;border-color:var(--flc-sky);box-shadow:0 0 0 3px var(--flc-sky-50)}
.tb-search svg{position:absolute;left:10px;top:9px;color:var(--muted)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--slate);border:1px solid transparent;position:relative}
.icon-btn:hover{background:var(--flc-sky-50);color:var(--flc-blue)}
.icon-btn .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--flc-red);border:2px solid #fff}

/* Role switcher */
.role-sw{position:relative}
.role-trigger{display:flex;align-items:center;gap:9px;padding:5px 9px 5px 6px;border:1px solid var(--line);border-radius:30px;background:var(--surface)}
.role-trigger:hover{border-color:var(--flc-sky);box-shadow:var(--sh-1)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--flc-blue),var(--flc-sky));color:#fff;font-weight:700;font-family:var(--d);font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 30px}
.role-meta{line-height:1.1;text-align:left}
.role-meta .n{font-size:12.5px;font-weight:600}
.role-meta .r{font-size:11px;color:var(--flc-blue);font-weight:600}
.role-caret{color:var(--muted)}
.role-menu{position:absolute;right:0;top:46px;width:300px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-3);padding:8px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:.16s;z-index:80}
.role-menu.open{opacity:1;visibility:visible;transform:none}
.role-menu .rm-h{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:8px 10px 6px}
.role-opt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer}
.role-opt:hover{background:var(--flc-sky-50)}
.role-opt.sel{background:var(--flc-sky-50)}
.role-opt .ra{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;font-family:var(--d)}
.role-opt .rt{font-size:13px;font-weight:600}
.role-opt .rd{font-size:11px;color:var(--muted)}
.role-opt .chk{margin-left:auto;color:var(--flc-blue)}

/* ---------- Page canvas ---------- */
.canvas{padding:22px;max-width:1500px;width:100%;margin:0 auto}
.page-head{display:flex;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head .ph-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--flc-blue);font-weight:600;margin-bottom:5px}
.page-head h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.page-head p{color:var(--muted);font-size:13.5px;margin-top:4px;max-width:620px}
.page-head .ph-actions{margin-left:auto;display:flex;gap:9px;align-items:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;border-radius:9px;font-weight:600;font-size:13px;border:1px solid var(--line);background:var(--surface);color:var(--slate);transition:.14s}
.btn:hover{border-color:var(--flc-sky);color:var(--flc-blue);box-shadow:var(--sh-1)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--flc-blue);border-color:var(--flc-blue);color:#fff}
.btn-primary:hover{background:var(--flc-blue-700);border-color:var(--flc-blue-700);color:#fff}
.btn-danger{background:var(--flc-red);border-color:var(--flc-red);color:#fff}
.btn-danger:hover{background:var(--flc-red-700);border-color:var(--flc-red-700);color:#fff}
.btn-ghost{background:transparent;border-color:transparent}
.btn-sm{height:31px;padding:0 11px;font-size:12px}
.chip-btn{height:32px;padding:0 12px;border-radius:30px;font-size:12.5px;border:1px solid var(--line);background:#fff;color:var(--slate);font-weight:500}
.chip-btn.on{background:var(--flc-blue);border-color:var(--flc-blue);color:#fff}

/* Cards & grid */
.grid{display:grid;gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-1)}
.card-pad{padding:18px}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
.card-h h3{font-size:15px;font-weight:700}
.card-h .sub{font-size:12px;color:var(--muted);font-weight:400}
.card-h .ch-r{margin-left:auto;display:flex;gap:7px;align-items:center}

/* KPI */
.kpi{padding:17px 18px;position:relative;overflow:hidden}
.kpi .k-top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.kpi .k-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--flc-sky-50);color:var(--flc-blue)}
.kpi .k-label{font-size:12px;color:var(--muted);font-weight:500}
.kpi .k-val{font-family:var(--d);font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1}
.kpi .k-val .cur{font-size:14px;color:var(--muted);font-weight:600;margin-right:3px}
.kpi .k-sub{margin-top:9px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.delta{display:inline-flex;align-items:center;gap:3px;font-weight:600;font-family:var(--m);font-size:11.5px;padding:2px 7px;border-radius:20px}
.delta.up{color:var(--green);background:var(--green-bg)}
.delta.down{color:var(--flc-red);background:#fdeaea}
.kpi .spark{position:absolute;right:14px;bottom:12px;opacity:.9}

/* Tables */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;font-family:var(--b);font-weight:600;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface-2)}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
table.tbl tr:last-child td{border-bottom:none}
table.tbl tbody tr:hover{background:var(--flc-sky-50)}
table.tbl td.num,table.tbl th.num{text-align:right;font-family:var(--m);font-variant-numeric:tabular-nums}
.t-strong{font-weight:600;color:var(--ink)}
.t-mut{color:var(--muted);font-size:12px}
.cell-id{font-family:var(--m);font-size:12px;color:var(--flc-blue);font-weight:500}

/* Badges / pills */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill .pd{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.green{color:var(--green);background:var(--green-bg)}
.pill.amber{color:var(--amber);background:var(--amber-bg)}
.pill.red{color:var(--flc-red-700);background:#fdeaea}
.pill.blue{color:var(--flc-blue);background:var(--flc-sky-50)}
.pill.violet{color:var(--violet);background:var(--violet-bg)}
.pill.teal{color:var(--teal);background:var(--teal-bg)}
.pill.gray{color:var(--slate);background:#eef2f6}

.avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--flc-blue),var(--flc-sky));color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--d);flex:0 0 28px}
.u-cell{display:flex;align-items:center;gap:9px}
.flag{font-size:15px;line-height:1}

/* Progress / meter */
.meter{height:7px;border-radius:6px;background:var(--line);overflow:hidden;position:relative}
.meter > i{position:absolute;inset:0 auto 0 0;border-radius:6px;background:linear-gradient(90deg,var(--flc-sky),var(--flc-blue))}
.meter.warn > i{background:linear-gradient(90deg,#f0b429,var(--amber))}
.meter.crit > i{background:linear-gradient(90deg,#f47171,var(--flc-red))}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 15px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:var(--flc-blue)}
.tab.active{color:var(--flc-blue);border-bottom-color:var(--flc-blue)}

/* Banners */
.banner{display:flex;gap:12px;padding:13px 15px;border-radius:var(--r);border:1px solid var(--line);background:var(--surface);align-items:flex-start}
.banner.info{background:var(--flc-sky-50);border-color:var(--flc-sky-200)}
.banner.warn{background:var(--amber-bg);border-color:#f4dd9b}
.banner .b-ic{flex:0 0 20px;color:var(--flc-blue)}
.banner.warn .b-ic{color:var(--amber)}
.banner .b-t{font-weight:600;font-size:13px}
.banner .b-d{font-size:12.5px;color:var(--slate);margin-top:2px}

/* Stepper / workflow */
.flow{display:flex;align-items:stretch;gap:0;flex-wrap:wrap}
.flow-step{flex:1;min-width:150px;position:relative;padding:14px 16px;border:1px solid var(--line);background:var(--surface);border-radius:var(--r)}
.flow-step + .flow-step{margin-left:10px}
.flow-step .fs-n{width:24px;height:24px;border-radius:50%;background:var(--flc-sky-50);color:var(--flc-blue);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:var(--d);margin-bottom:8px}
.flow-step.done .fs-n{background:var(--green);color:#fff}
.flow-step.active{border-color:var(--flc-blue);box-shadow:0 0 0 3px var(--flc-sky-50)}
.flow-step.active .fs-n{background:var(--flc-blue);color:#fff}
.flow-step .fs-t{font-weight:600;font-size:13px}
.flow-step .fs-d{font-size:11.5px;color:var(--muted);margin-top:2px}

/* Forms */
.field{margin-bottom:14px}
.field > label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:6px}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:5px}
.inp,select.inp,textarea.inp{width:100%;height:38px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 12px;font-family:var(--b);font-size:13.5px;color:var(--ink)}
textarea.inp{height:auto;padding:10px 12px;resize:vertical}
.inp:focus{outline:none;border-color:var(--flc-sky);box-shadow:0 0 0 3px var(--flc-sky-50)}
.inp-pre{display:flex;align-items:center;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
.inp-pre .pre{padding:0 11px;color:var(--muted);background:var(--surface-2);height:38px;display:flex;align-items:center;font-size:13px;border-right:1px solid var(--line);font-family:var(--m)}
.inp-pre input{border:none;flex:1;height:38px;padding:0 12px;font-family:var(--b);font-size:13.5px}
.inp-pre input:focus{outline:none}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.toggle{position:relative;width:40px;height:22px;border-radius:20px;background:var(--line);transition:.15s;flex:0 0 40px}
.toggle.on{background:var(--flc-blue)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(18px)}

/* Modal */
.modal-bk{position:fixed;inset:0;background:rgba(6,42,72,.45);backdrop-filter:blur(2px);z-index:90;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bk.open{display:flex}
.modal{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-3);width:100%;max-width:560px;max-height:88vh;overflow:auto}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
.modal-h h3{font-size:16px}
.modal-b{padding:20px}
.modal-f{padding:14px 20px;border-top:1px solid var(--line-2);display:flex;gap:9px;justify-content:flex-end;background:var(--surface-2)}

/* Misc layout helpers */
.muted{color:var(--muted)}
.tiny{font-size:11.5px}
.right{margin-left:auto}
.flex{display:flex}.aic{align-items:center}.gap{gap:10px}.gap-sm{gap:6px}.wrap{flex-wrap:wrap}
.mt{margin-top:16px}.mt-s{margin-top:8px}.mb{margin-bottom:16px}
.divider{height:1px;background:var(--line-2);margin:16px 0}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .e-ic{width:46px;height:46px;border-radius:13px;background:var(--flc-sky-50);color:var(--flc-blue);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* Bars chart */
.bars{display:flex;align-items:flex-end;gap:10px;height:170px;padding-top:8px}
.bars .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.bars .bar{width:100%;max-width:34px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--flc-sky),var(--flc-blue));position:relative;transition:height .3s}
.bars .bar.alt{background:linear-gradient(180deg,#9ec9e8,#5fa3d4)}
.bars .bx{font-size:11px;color:var(--muted);font-weight:500}

/* Donut */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut{width:140px;height:140px;border-radius:50%;flex:0 0 140px}
.donut-legend{flex:1;min-width:160px;display:flex;flex-direction:column;gap:9px}
.dl-row{display:flex;align-items:center;gap:9px;font-size:13px}
.dl-row .sw{width:11px;height:11px;border-radius:3px}
.dl-row .v{margin-left:auto;font-family:var(--m);font-weight:600}

/* Heat cells */
.heat{display:inline-block;padding:5px 9px;border-radius:7px;font-family:var(--m);font-size:12px;font-weight:600}

/* Audit timeline */
.tl{position:relative;padding-left:26px}
.tl::before{content:"";position:absolute;left:9px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tl-i{position:relative;padding:0 0 18px}
.tl-i::before{content:"";position:absolute;left:-21px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--flc-sky)}
.tl-i.create::before{border-color:var(--green)}
.tl-i.reject::before{border-color:var(--flc-red)}
.tl-i.edit::before{border-color:var(--amber)}
.tl-i .tl-h{font-size:13px;font-weight:600}
.tl-i .tl-m{font-size:12px;color:var(--muted);margin-top:1px}
.tl-i .tl-time{font-size:11px;color:var(--muted);font-family:var(--m);margin-top:3px}

/* Comparison */
.vs-grid{display:grid;grid-template-columns:1fr 54px 1fr;gap:0;align-items:stretch}
.vs-col{padding:18px;border:1px solid var(--line);background:var(--surface)}
.vs-col:first-child{border-radius:var(--r-lg) 0 0 var(--r-lg)}
.vs-col:last-child{border-radius:0 var(--r-lg) var(--r-lg) 0}
.vs-mid{display:flex;align-items:center;justify-content:center;font-family:var(--d);font-weight:800;color:var(--muted);background:var(--surface-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}

function toggleSidebar(open){const sb=document.getElementById('sidebar'),sc=document.getElementById('scrim');if(open===undefined)open=!sb.classList.contains('open');sb.classList.toggle('open',open);sc.classList.toggle('show',open);}
function toggleRole(e){e.stopPropagation();document.getElementById('roleMenu').classList.toggle('open');}
document.addEventListener('click',()=>{const m=document.getElementById('roleMenu');if(m)m.classList.remove('open');});
function setRole(id){STATE.role=id;renderShell();}
function go(id){STATE.route=id;toggleSidebar(false);renderShell();window.scrollTo(0,0);}

/* crumb + view dispatch */
function findNav(id){for(const g of NAV)for(const it of g.items)if(it.id===id)return{...it,grp:g.grp};return{label:'Dashboards',grp:'Overview'};}
function renderView(){
  const nav=findNav(STATE.route);
  document.getElementById('crumb').innerHTML=`Future Link CMS <span class="sep">/</span> ${nav.grp} <span class="sep">/</span> <b>${nav.label}</b>`;
  const fn = PAGES[STATE.route]||PAGES.dashboard;
  document.getElementById('view').innerHTML = `<div class="canvas">${fn()}</div>`;
  if(window._afterRender) window._afterRender();
}
const PAGES = {}; // populated by module scripts
</script>
<script>
/* ============ shared UI helpers ============ */
function kpi(label,val,cur,delta,dir,icon,spark){
  return `<div class="card kpi">
    <div class="k-top"><div class="k-ic">${svg(icon,18)}</div><div class="k-label">${label}</div></div>
    <div class="k-val">${cur?`<span class="cur">${cur} </span>`:''}${val}</div>
    <div class="k-sub"><span class="delta ${dir}">${dir==='up'?'▲':'▼'} ${delta}</span><span>vs last period</span></div>
    ${spark?`<svg class="spark" width="74" height="34" viewBox="0 0 74 34"><polyline fill="none" stroke="${dir==='up'?'var(--green)':'var(--flc-red)'}" stroke-width="2" points="${spark}"/></svg>`:''}
  </div>`;
}
function bars(data,alt){const max=Math.max(...data.map(d=>d.v));return `<div class="bars">${data.map(d=>`<div class="bar-col"><div class="bar ${d.alt?'alt':''}" style="height:${Math.round(d.v/max*100)}%" title="${d.label}: ${d.v}"></div><div class="bx">${d.label}</div></div>`).join('')}</div>`;}
function donut(segs){let acc=0;const grad=segs.map(s=>{const a=acc;acc+=s.v;return `${s.c} ${a}% ${acc}%`;}).join(',');
  return `<div class="donut-wrap"><div class="donut" style="background:conic-gradient(${grad});-webkit-mask:radial-gradient(circle 42px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 42px at center,transparent 98%,#000 100%)"></div>
  <div class="donut-legend">${segs.map(s=>`<div class="dl-row"><span class="sw" style="background:${s.c}"></span>${s.label}<span class="v">${s.v}%</span></div>`).join('')}</div></div>`;}
function meter(used,alloc,cls=''){const p=Math.min(100,Math.round(used/alloc*100));const c=p>90?'crit':p>70?'warn':cls;return `<div class="meter ${c}"><i style="width:${p}%"></i></div>`;}

/* ============ DASHBOARD (role-aware) ============ */
PAGES.dashboard = function(){
  const r=ROLES.find(x=>x.id===STATE.role);
  const isExec = ['super','admin','regional'].includes(STATE.role);
  const isFin = STATE.role==='finance';
  const isCounselor = ['counselor','visa','lead'].includes(STATE.role);
  let head = `<div class="page-head">
    <div><div class="ph-eyebrow">${r.title} workspace</div>
    <h1>${isCounselor?'My Commercial Performance':isFin?'Finance & Revenue Control':'Executive Command Center'}</h1>
    <p>${isCounselor?'Your wallet balance, applied offers, conversions and incentive earnings — June 2026.':'Live commercial position across all branches, currencies and services. Figures consolidated to '+STATE.cur+'.'}</p></div>
    <div class="ph-actions">
      <button class="btn btn-sm" onclick="openModal('exportModal')">${svg('download',15)} Export</button>
      <button class="btn btn-sm">${svg('filter',15)} This Quarter</button>
      ${isExec?`<button class="btn btn-primary btn-sm" onclick="go('reporting')">${svg('plus',15)} New report</button>`:''}
    </div></div>`;

  if(isCounselor){
    const c=COUNSELORS.find(x=>x.name==='Ankita')||COUNSELORS[2];
    const avail=c.wallet-c.walletUsed, usedPct=Math.round(c.walletUsed/c.wallet*100);

  <div class="banner info mb"><span class="b-ic">${svg('link',18)}</span><div><div class="b-t">Records are inherited from the CRM</div><div class="b-d">Clients, leads, services and invoices live in the CRM. The CMS reads them and writes back the commercial outcome — no duplicate records.</div></div></div>
  <div class="card"><div class="card-h"><h3>Client commercial records</h3>
    <span class="ch-r"><button class="chip-btn on">All</button><button class="chip-btn">Quote</button><button class="chip-btn">Invoice draft</button><button class="chip-btn">Paid</button></span></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Client</th><th>Lead</th><th>Service</th><th>Stage</th><th class="num">Original</th><th class="num">Discount</th><th class="num">Final</th><th class="num">Paid</th><th></th></tr></thead><tbody>
    ${CLIENTS.map(c=>{const disc=c.offerDisc+c.walletDisc; const cur=c.cur; const m=(v)=>`<span class="cur">${cur} </span>${fmt(v)}`;
      const locked = c.stage==='Partial paid'||c.stage==='Full paid';
      return `<tr style="cursor:pointer" onclick="openClient('${c.id}')">
      <td><span class="cell-id">${c.id}</span><div class="t-strong">${c.name}</div><div class="t-mut tiny">${c.counselor} · ${c.branch}</div></td>
      <td class="mono tiny">${c.lead}</td>
      <td class="t-mut">${c.service}</td>
      <td><span class="pill ${locked?'gray':c.stage==='Quote'?'amber':'blue'}">${locked?svg('lock',12)+' ':''}${c.stage}</span></td>
      <td class="num mono">${fmt(c.orig)}</td>
      <td class="num">${disc?'<span class="t-strong" style="color:var(--green)">-'+fmt(disc)+'</span>':'—'}<div class="t-mut tiny">${c.offer||'wallet'}</div></td>
      <td class="num t-strong">${m(c.final)}</td>
      <td class="num mono ${c.paid?'':'muted'}">${c.paid?fmt(c.paid):'—'}</td>
      <td>${svg('arrow',16)}</td></tr>`;}).join('')}
    </tbody></table></div></div>`;
};
function openClient(id){const c=CLIENTS.find(x=>x.id===id);const cur=c.cur;const m=(v)=>`${cur} ${fmt(v)}`;
  const disc=c.offerDisc+c.walletDisc; const out=c.final-c.paid;
  const locked=c.stage==='Partial paid'||c.stage==='Full paid';
  document.getElementById('detailTitle').innerHTML=`<span class="cell-id">${c.id}</span> · ${c.name}`;
  document.getElementById('detailBody').innerHTML=`
    <div class="flex aic gap wrap mb"><span class="pill blue">${c.service}</span><span class="pill ${locked?'gray':'amber'}">${locked?svg('lock',12)+' Commercial terms locked':c.stage}</span><span class="t-mut tiny">Lead ${c.lead} · ${c.counselor}</span></div>
    ${locked?`<div class="banner warn mb"><span class="b-ic">${svg('lock',18)}</span><div><div class="b-t">Locked — payment activity has begun</div><div class="b-d">Offer codes and wallet discounts can no longer be applied. An authorised override with reason is required to change terms.</div></div></div>`:''}
    <div class="card" style="background:var(--surface-2)"><div class="card-pad">
      <div class="vs-row"><span class="vl">Original price</span><span class="vv">${m(c.orig)}</span></div>
      <div class="vs-row"><span class="vl">Offer discount ${c.offer?'· '+c.offer:''}</span><span class="vv" style="color:var(--green)">${c.offerDisc?'-'+m(c.offerDisc):'—'}</span></div>
      <div class="vs-row"><span class="vl">Wallet discount</span><span class="vv" style="color:var(--green)">${c.walletDisc?'-'+m(c.walletDisc):'—'}</span></div>
      <div class="vs-row"><span class="vl t-strong">Final invoice amount</span><span class="vv t-strong">${m(c.final)}</span></div>
      <div class="vs-row"><span class="vl">Payment received</span><span class="vv">${c.paid?m(c.paid):'—'}</span></div>
      <div class="vs-row" style="border:none"><span class="vl">Outstanding balance</span><span class="vv ${out>0?'':'muted'}">${m(out)}</span></div>
    </div></div>
    <div class="divider"></div>
    <div class="muted tiny mb">Eligibility checks (auto)</div>
    <div class="flex wrap gap-sm mb">
      <span class="pill green"><span class="pd"></span>Not enrolled in this service</span>
      <span class="pill green"><span class="pd"></span>Wallet has balance</span>
      <span class="pill green"><span class="pd"></span>Code valid for branch/service</span>
      ${locked?'<span class="pill red"><span class="pd"></span>Invoice locked</span>':'<span class="pill green"><span class="pd"></span>Before invoice finalization</span>'}
    </div>
    <div class="muted tiny mb">Commercial history</div>
    <div class="tl"><div class="tl-i create"><div class="tl-h">Discount applied</div><div class="tl-m">${c.counselor} · ${disc?m(disc):'none'} ${c.offer?'· '+c.offer:''}</div><div class="tl-time">From lead profile</div></div>
    ${c.paid?`<div class="tl-i edit"><div class="tl-h">Payment received → terms locked</div><div class="tl-m">${m(c.paid)}</div><div class="tl-time">Auto-lock triggered</div></div>`:''}</div>`;
  document.getElementById('detailFoot').innerHTML=`<button class="btn" onclick="closeModal('detailModal')">Close</button>${locked?'<button class="btn btn-danger">Request override</button>':'<button class="btn btn-primary">Apply / update discount</button>'}`;
  openModal('detailModal');
}
