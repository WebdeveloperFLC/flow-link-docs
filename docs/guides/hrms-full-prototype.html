<script type="text/babel">
var {useState, useEffect, useMemo, useCallback, createContext, useContext} = React;

/* ============ PERSISTENCE ============ */
const KEY='flhrms_v2';
const mem={data:null};
const Persist={
  load(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}return mem.data;},
  save(d){mem.data=d;try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}},
  clear(){mem.data=null;try{localStorage.removeItem(KEY);}catch(e){}}
};

/* ============ PAYROLL ENGINE (exact Excel) ============ */
function lateDeduction(l){if(l<=3)return 0;if(l<=6)return .5;if(l<=9)return 1;if(l<=12)return 1.5;if(l<=15)return 2;if(l<=18)return 2.5;if(l<=21)return 3;if(l<=24)return 3.5;if(l<=27)return 4;return 5;}
function mispunchDeduction(m){return m<=2?0:(m-2)*.5;}
function computePayroll(r){
  const K=lateDeduction(r.late||0), N=mispunchDeduction(r.mispunch||0), co=r.compoff||0;
  const trainingUnpaid=r.trainingUnpaid||0;
  const payable=(r.payrollDays||30)-(r.leaves||0)+(r.paidLeaves||0)+co-K-((r.ul||0)*2)-(r.sandwich||0)-N-trainingUnpaid;
  const monthly=r.monthly||0;
  const daily=monthly/(r.payrollDays||30);
  const gross=Math.round(daily*payable);
  // statutory (illustrative standard rates)
  const basic=r.basic!=null?r.basic:Math.round(monthly*0.5);
  const pfWage=Math.min(basic,15000);
  const pfEmp=r.pfApplicable!==false?Math.round(pfWage*0.12):0;
  const esicEmp=(r.esicApplicable!==false && monthly<=21000)?Math.round(gross*0.0075):0;
  const incentive=r.incentive||0, bonus=r.bonus||0;
  const net=gross+incentive+bonus-pfEmp-esicEmp;
  return {K,N,payable:Math.round(payable*100)/100,daily:Math.round(daily*100)/100,gross,pfEmp,esicEmp,incentive,bonus,net:Math.round(net),compoff:co,trainingUnpaid};
}

/* ============ ATTENDANCE ROLL-UP ============ */
function toMin(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function fmtDur(min){if(min==null||isNaN(min))return '—';const h=Math.floor(min/60),m=Math.round(min%60);return (h?h+'h ':'')+m+'m';}
function dayMetrics(a,shift){
  // returns {net, breakMin, otMin, lateMin}
  const ci=toMin(a.in), co=toMin(a.out), bs=toMin(a.bStart), be=toMin(a.bEnd);
  let breakMin=a.breakMin!=null?a.breakMin:((bs!=null&&be!=null)?be-bs:0);
  let gross = (ci!=null&&co!=null)? (co-ci):null;
  let net = gross!=null? gross-breakMin : null;
  const target = shift? (toMin(shift.logout)-toMin(shift.login)-(shift.breakDur||0)) : null;
  let otMin = (net!=null&&target!=null&&net>target)? net-target : 0;
  const login = shift? toMin(shift.login) : toMin('10:00');
  const grace = shift? (shift.grace||5) : 5;
  let lateMin = (ci!=null&&login!=null)? Math.max(0, ci-login) : 0;
  return {net, breakMin, otMin, lateMin, lateBeyondGrace: lateMin>grace};
}
function rollup(att,shift){
  let lateCount=0,mispunch=0,leaves=0,working=0,wOff=0,half=0,absent=0,otMin=0,breakMin=0,netMin=0;
  att.forEach(a=>{
    const m=dayMetrics(a,shift);
    if(a.status==='Week Off'||a.status==='Holiday'){wOff++;return;}
    if(a.status==='Leave'||a.status==='Sick Leave'){leaves++;return;}
    if(a.status==='Unauthorized Leave')return;
    if(a.status==='Absent'){absent++;return;}
    if(a.status==='Half Day'){half++;working+=0.5;}
    else if(a.status==='Present'){working++;}
    if(m.lateBeyondGrace)lateCount++;
    if(a.mispunch)mispunch++;
    otMin+=m.otMin; breakMin+=m.breakMin; if(m.net!=null)netMin+=m.net;
  });
  return {lateCount,mispunch,leaves,working:Math.round(working*10)/10,wOff,half,absent,otMin,breakMin,netMin};
}
// Derive the day status + mispunch flag from the punches, given the shift rules.
// Leave/Week Off/Holiday are manual statuses and are preserved; punch-driven days resolve to Present/Half Day/Absent.
const MANUAL_STATUSES=['Leave','Sick Leave','Week Off','Holiday','Unauthorized Leave'];
function derivePunchStatus(a,shift){
  if(MANUAL_STATUSES.includes(a.status)) return {status:a.status, mispunch:a.mispunch};
  const ci=toMin(a.in), co=toMin(a.out);
  const login=shift?toMin(shift.login):toMin('10:00');
  const halfAfter=shift?(shift.halfDayAfter||60):60;
  if(ci==null && co==null) return {status:'Absent', mispunch:false};
  // exactly one punch present = mispunch
  const mispunch=(ci==null)!==(co==null);
  let status='Present';
  if(ci!=null && login!=null && (ci-login)>halfAfter) status='Half Day';
  return {status, mispunch};
}

  return {

<script type="text/babel">
var {useState, useEffect, useCallback, createContext, useContext} = React;

const Store=createContext();

function StoreProvider({children}){
  const [db,setDb]=useState(()=>Persist.load()||window.__seed());

  const deriveInputs=useCallback((emp,d)=>{
    const data=d||db;
    const shift=data.shifts.find(s=>s.id===emp.shiftId)||data.shifts[0];
    const att=data.attendance[emp.id]||[];

    const approvedCompoff=data.compoff.filter(c=>c.empId===emp.id&&c.status==='Approved').length;

    const misApproved=data.mispunch.filter(x=>x.empId===emp.id&&x.status==='Approved').length;
    const trainingUnpaid=data.training.filter(t=>t.empId===emp.id&&t.status!=='Cancelled').reduce((s,t)=>s+(t.unpaidDays||0),0);
    const auto={
      late:Math.max(0,ru.lateCount-lateExempt),
      mispunch:Math.max(0,ru.mispunch-misApproved),
      leaves:ru.leaves, wOff:ru.wOff, working:ru.working,
      otMin:ru.otMin, breakMin:ru.breakMin, netMin:ru.netMin,
      paidLeaves:approvedPaidLeave, compoff:approvedCompoff,
      ul:att.filter(a=>a.status==='Unauthorized Leave').length,
      sandwich:emp.manual.sandwich||0, trainingUnpaid,
    };
    if(emp.override&&emp.override.on){
      const o=emp.override;
      return {...auto, late:o.late??auto.late,mispunch:o.mispunch??auto.mispunch,leaves:o.leaves??auto.leaves,wOff:o.wOff??auto.wOff,paidLeaves:o.paidLeaves??auto.paidLeaves,compoff:o.compoff??auto.compoff,ul:o.ul??auto.ul,sandwich:o.sandwich??auto.sandwich,overridden:true};
    }
    return {...auto,overridden:false};
  },[db]);

  const empRow=useCallback((emp,d)=>{
    const data=d||db;

    return {...emp,...inp,...calc};
  },[db,deriveInputs]);

  const actions={
    addEmployee(e){setDb(d=>{const id='FL-'+d.seq.EMP;const ne={id,override:{on:false},manual:{paidLeaves:0,ul:0,sandwich:0,compoff:0},docs:[],shiftId:e.shiftId||'S1',...e};let nd={...d,employees:[...d.employees,ne],attendance:{...d.attendance,[id]:[]},seq:{...d.seq,EMP:d.seq.EMP+1}};return audit(nd,'Employee Added',e.name+' · '+id,'—',e.name);});fire('Employee '+e.name+' added');},
    updateEmployee(id,patch){setDb(d=>{const e=d.employees.find(x=>x.id===id);let nd={...d,employees:d.employees.map(x=>x.id===id?{...x,...patch}:x)};return audit(nd,'Employee Updated',e.name+' · '+id,'—','edited');});fire('Employee updated');},
    deleteEmployee(id){setDb(d=>{const e=d.employees.find(x=>x.id===id);let nd={...d,employees:d.employees.filter(x=>x.id!==id)};return audit(nd,'Employee Removed',e.name+' · '+id,e.name,'—');});fire('Employee removed');},
    setOverride(id,override){setDb(d=>{const e=d.employees.find(x=>x.id===id);let nd={...d,employees:d.employees.map(x=>x.id===id?{...x,override}:x)};return audit(nd,'Payroll Override',e.name,override.on?'auto':'override',override.on?'manual':'auto');});fire(override.on?'Manual override on':'Reverted to auto roll-up');},
    addDoc(id,doc){setDb(d=>({...d,employees:d.employees.map(e=>e.id===id?{...e,docs:[...e.docs,doc]}:e)}));fire('Document uploaded');},
    removeDoc(id,doc){setDb(d=>({...d,employees:d.employees.map(e=>e.id===id?{...e,docs:e.docs.filter(x=>x!==doc)}:e)}));fire('Document removed');},
    setPhoto(id,photo){setDb(d=>({...d,employees:d.employees.map(e=>e.id===id?{...e,photo}:e)}));fire('Photo updated');},
    setPunch(empId,idx,patch){setDb(d=>{const emp=d.employees.find(e=>e.id===empId);const shift=d.shifts.find(s=>s.id===(emp&&emp.shiftId))||d.shifts[0];const arr=(d.attendance[empId]||[]).map((a,i)=>{if(i!==idx)return a;let na={...a,...patch};
        // if the edit touched punch fields (not an explicit status/mispunch override), re-derive status
        if(('in' in patch||'out' in patch)&&!('status' in patch)){const der=derivePunchStatus(na,shift);na.status=der.status;na.mispunch=der.mispunch;}
        return na;});let nd={...d,attendance:{...d.attendance,[empId]:arr}};return audit(nd,'Attendance Edited',empId+' · '+arr[idx].date,'—',patch.status||arr[idx].status);});fire('Attendance updated — payroll recalculated');},
    // live punch: stamp current HH:MM into the given field and re-derive status
    punch(empId,idx,field){setDb(d=>{const emp=d.employees.find(e=>e.id===empId);const shift=d.shifts.find(s=>s.id===(emp&&emp.shiftId))||d.shifts[0];const now=new Date();const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
        const arr=(d.attendance[empId]||[]).map((a,i)=>{if(i!==idx)return a;let na={...a,[field]:hhmm};if(field==='bEnd'&&na.bStart){na.breakMin=Math.max(0,toMin(hhmm)-toMin(na.bStart));}const der=derivePunchStatus(na,shift);na.status=der.status;na.mispunch=der.mispunch;return na;});
        let nd={...d,attendance:{...d.attendance,[empId]:arr}};const lbl={in:'Check In',out:'Check Out',bStart:'Break Start',bEnd:'Break End'}[field];return audit(nd,lbl,empId+' · '+arr[idx].date,'—',hhmm);});
      const lbl={in:'Checked in',out:'Checked out',bStart:'Break started',bEnd:'Break ended'}[field];fire(lbl+' — payroll recalculated');},
    addToday(empId){setDb(d=>{const now=new Date();const date=String(now.getDate()).padStart(2,'0')+' '+now.toLocaleString('en-US',{month:'short'});const day=now.toLocaleString('en-US',{weekday:'short'});const arr=d.attendance[empId]||[];if(arr.some(a=>a.date===date))return d;const nd={...d,attendance:{...d.attendance,[empId]:[...arr,{date,day,in:null,out:null,bStart:null,bEnd:null,breakMin:0,status:'Absent',mispunch:false}]}};return audit(nd,'Day Started',empId+' · '+date,'—','new row');});fire("Today's row added — punch in to begin");},
    startAndCheckIn(empId){setDb(d=>{const emp=d.employees.find(e=>e.id===empId);const shift=d.shifts.find(s=>s.id===(emp&&emp.shiftId))||d.shifts[0];const now=new Date();const date=String(now.getDate()).padStart(2,'0')+' '+now.toLocaleString('en-US',{month:'short'});const day=now.toLocaleString('en-US',{weekday:'short'});const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');let arr=d.attendance[empId]||[];let idx=arr.findIndex(a=>a.date===date);if(idx<0){arr=[...arr,{date,day,in:null,out:null,bStart:null,bEnd:null,breakMin:0,status:'Absent',mispunch:false}];idx=arr.length-1;}arr=arr.map((a,i)=>{if(i!==idx)return a;let na={...a,in:hhmm};const der=derivePunchStatus(na,shift);na.status=der.status;na.mispunch=der.mispunch;return na;});const nd={...d,attendance:{...d.attendance,[empId]:arr}};return audit(nd,'Check In',empId+' · '+date,'—',hhmm);});fire('Checked in — payroll recalculated');},

    addShift(s){setDb(d=>{const id='S'+d.seq.SH;let nd={...d,shifts:[...d.shifts,{id,...s}],seq:{...d.seq,SH:d.seq.SH+1}};return audit(nd,'Shift Created',s.name,'—',s.login+'–'+s.logout);});fire('Shift created');},
    updateShift(id,patch){setDb(d=>({...d,shifts:d.shifts.map(s=>s.id===id?{...s,...patch}:s)}));fire('Shift updated');},
    deleteShift(id){setDb(d=>({...d,shifts:d.shifts.filter(s=>s.id!==id)}));fire('Shift deleted');},

    addLeave(l){setDb(d=>{const id='LV-'+d.seq.LV;const e=d.employees.find(x=>x.id===l.empId);let nd={...d,leaves:[...d.leaves,{id,status:'Pending',...l}],seq:{...d.seq,LV:d.seq.LV+1}};return audit(nd,'Leave Applied',id+' · '+(e?e.name:''),'—','Pending');});fire('Leave request submitted');},
    setLeaveStatus(id,status){setDb(d=>{const l=d.leaves.find(x=>x.id===id);const e=d.employees.find(x=>x.id===l.empId);let nd={...d,leaves:d.leaves.map(x=>x.id===id?{...x,status}:x)};return audit(nd,'Leave '+status,id+' · '+(e?e.name:''),l.status,status);});fire('Leave '+status.toLowerCase()+' — payroll recalculated');},

    setLateStatus(id,status){setDb(d=>{const x=d.late.find(z=>z.id===id);const e=d.employees.find(z=>z.id===x.empId);let nd={...d,late:d.late.map(z=>z.id===id?{...z,status}:z)};return audit(nd,'Late Exemption '+status,id+' · '+(e?e.name:''),x.status,status);});fire('Late exemption '+status.toLowerCase()+' — recalculated');},
    // mispunch
    setMispunchStatus(id,status){setDb(d=>{const x=d.mispunch.find(z=>z.id===id);const e=d.employees.find(z=>z.id===x.empId);let nd={...d,mispunch:d.mispunch.map(z=>z.id===id?{...z,status}:z)};return audit(nd,'Mispunch '+status,id+' · '+(e?e.name:''),x.status,status);});fire('Mispunch '+status.toLowerCase()+' — recalculated');},
    // training
    addTraining(t){setDb(d=>{const id='TR-'+d.seq.TR;const e=d.employees.find(x=>x.id===t.empId);let nd={...d,training:[...d.training,{id,status:'In Progress',...t}],seq:{...d.seq,TR:d.seq.TR+1}};return audit(nd,'Training Assigned',id+' · '+(e?e.name:''),'—',t.type);});fire('Training assigned — unpaid days affect payroll');},
    updateTraining(id,patch){setDb(d=>{const t=d.training.find(x=>x.id===id);let nd={...d,training:d.training.map(x=>x.id===id?{...x,...patch}:x)};return audit(nd,'Training Updated',id,t.status,patch.status||'edited');});fire('Training updated');},
    deleteTraining(id){setDb(d=>({...d,training:d.training.filter(x=>x.id!==id)}));fire('Training removed');},
    // holidays
    addHoliday(h){setDb(d=>{const id='H'+d.seq.H;let nd={...d,holidays:[...d.holidays,{id,...h}],seq:{...d.seq,H:d.seq.H+1}};return audit(nd,'Holiday Added',h.name,'—',h.date);});fire('Holiday added');},
    deleteHoliday(id){setDb(d=>{const h=d.holidays.find(x=>x.id===id);let nd={...d,holidays:d.holidays.filter(x=>x.id!==id)};return audit(nd,'Holiday Removed',h.name,h.date,'—');});fire('Holiday removed');},
    // cycle
    setCycle(patch){setDb(d=>({...d,cycle:{...d.cycle,...patch}}));fire('Cycle saved');},
    approvePayroll(){setDb(d=>{let nd={...d,cycle:{...d.cycle,approved:true}};return audit(nd,'Payroll Approved','Cycle '+d.cycle.start,'Draft','Approved');});fire('Payroll approved & locked');},
    reopenPayroll(){setDb(d=>({...d,cycle:{...d.cycle,approved:false}}));fire('Payroll reopened');},
    setPerm(role,p,val){setDb(d=>{const access=JSON.parse(JSON.stringify(d.access||window.__defaultAccess()));access[role].perms[p]=val?1:0;let nd={...d,access};return audit(nd,'Permission '+(val?'Granted':'Revoked'),role+' · '+p,val?'off':'on',val?'on':'off');});fire(role+': '+p+' '+(val?'granted':'revoked'));},
    setScreen(role,screen,val){setDb(d=>{const access=JSON.parse(JSON.stringify(d.access||window.__defaultAccess()));access[role].screens[screen]=!!val;let nd={...d,access};return audit(nd,'Screen '+(val?'Shown':'Hidden'),role+' · '+screen,val?'hidden':'shown',val?'shown':'hidden');});fire(role+': '+screen+' '+(val?'shown':'hidden'));},
    resetAccess(){setDb(d=>{let nd={...d,access:window.__defaultAccess()};return audit(nd,'Access Reset','All roles → defaults','custom','default');});fire('Access matrix reset to defaults');},
    reset(){Persist.clear();setDb(window.__seed());fire('Reset to seed data');},
  };
  return <Store.Provider value={{db,empRow,deriveInputs,actions,fire,toast}}>{children}</Store.Provider>;
}

/* ============ HELPERS ============ */
const sBadge=(s)=>{const m={'Present':'b-present','Half Day':'b-half','Leave':'b-leave','Sick Leave':'b-leave','Holiday':'b-holiday','Week Off':'b-weekoff','Absent':'b-absent','Unauthorized Leave':'b-absent','Approved':'b-approved','Pending':'b-pending','Rejected':'b-rejected','In Progress':'b-training','Completed':'b-approved','Extended':'b-pending'};return <span className={'badge '+(m[s]||'b-weekoff')}>{s}</span>;};
const inr=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');
const Stat=({lab,val,meta,color})=><div className="stat" style={{background:'linear-gradient(135deg,'+color+'0d,'+color+'03)'}}><span className="accent" style={{background:color}}></span><div className="lab" style={{color}}>{lab}</div><div className="val">{val}</div><div className="meta">{meta}</div></div>;
const STATUSES=['Present','Half Day','Absent','Leave','Sick Leave','Holiday','Week Off','Unauthorized Leave'];
const DOC_TYPES=['Employee Photograph','Resume / CV','Aadhaar Card','PAN Card','Passport','Driving License','Educational Certificate','Degree Certificate','Diploma Certificate','Mark Sheet','Professional Certification','Experience Letter','Relieving Letter','Previous Appointment Letter','Previous Salary Slip','Bank Statement','Offer Letter','Appointment Letter','Employment Agreement','Confirmation Letter','Promotion Letter','Increment Letter','Transfer Letter','Warning Letter','Show Cause Notice','Termination Letter','Salary Slip','Form 16','Other'];
function name(db,id){const e=db.employees.find(x=>x.id===id);return e?e.name:id;}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2);}
</script>

<script type="text/babel">
var {useState, useEffect, useCallback} = React;

/* ============ SHELL ============ */
/* ============ ROLE ACCESS MODEL ============ */
// permissions: view, apply, approve, override, export, configure, manageEmp
const ALL_SCREENS=['dashboard','ess','emp360','employees','shifts','training','calculator','verify','attendance','leave','compoff','late','mispunch','holiday','config','roles','audit'];
const ROLE_LIST=['Super Admin','Admin','HR Manager','HR Executive','Manager','Employee'];
const PERM_LIST=['view','apply','approve','override','export','configure','manageEmp'];
const PERM_LABELS={view:'View',apply:'Apply',approve:'Approve',override:'Override',export:'Export',configure:'Configure',manageEmp:'Manage Emp'};
// store-driven: access object lives in db.access and is editable
function canSeeIn(access,role,screen){const a=access&&access[role];return a?!!a.screens[screen]:false;}
function permIn(access,role,p){const a=access&&access[role];return a?!!a.perms[p]:false;}
const RoleCtx=createContext({role:'Super Admin',can:()=>true,canSee:()=>true});
function useRole(){return useContext(RoleCtx);}

function Shell(){
  const {db,actions,toast}=useStore();
  const [view,setView]=useState('dashboard');
  const [role,setRole]=useState('HR Manager');
  const access=db.access||window.__defaultAccess();
  const can=useCallback((p)=>permIn(access,role,p),[access,role]);
  const canSee=useCallback((s)=>canSeeIn(access,role,s),[access,role]);
  const allowedScreens=ALL_SCREENS.filter(s=>canSeeIn(access,role,s));
  // if current screen not allowed for this role, redirect to first allowed
  useEffect(()=>{
    if(!canSeeIn(access,role,view)){
      setView(allowedScreens[0]||'ess');
    }
  },[role,view,access]);
  const pend=(arr)=>arr.filter(x=>x.status==='Pending').length;
  const NAV=[
    {grp:'Workspace',items:[{k:'dashboard',ic:'◧',t:'Payroll Dashboard'},{k:'ess',ic:'◔',t:'My Portal (ESS)'},{k:'emp360',ic:'⊚',t:'Employee 360°'}]},
    {grp:'People',items:[{k:'employees',ic:'⊞',t:'Employee Master'},{k:'shifts',ic:'◐',t:'Shift Management'},{k:'training',ic:'◵',t:'Training'}]},
    {grp:'Payroll',items:[{k:'calculator',ic:'∑',t:'Payable Days Engine'},{k:'verify',ic:'▤',t:'Payroll Verification'}]},
    {grp:'Time & Attendance',items:[{k:'attendance',ic:'◰',t:'Attendance'},{k:'leave',ic:'⊟',t:'Leave',ct:pend(db.leaves)},{k:'compoff',ic:'⇄',t:'Comp-Off',ct:pend(db.compoff)},{k:'late',ic:'◷',t:'Late Coming',ct:pend(db.late)},{k:'mispunch',ic:'⊠',t:'Mispunch',ct:pend(db.mispunch)},{k:'holiday',ic:'◇',t:'Holidays'}]},
    {grp:'Configuration',items:[{k:'config',ic:'⚙',t:'Payroll & Policy'},{k:'roles',ic:'⊕',t:'Roles & Access'},{k:'audit',ic:'≡',t:'Audit Logs'}]},
  ];
  const titles={dashboard:'Payroll Dashboard',ess:'Employee Self-Service',emp360:'Employee 360° View',employees:'Employee Master',shifts:'Shift Management',training:'Training Management',calculator:'Payable Days Engine',verify:'Payroll Verification',attendance:'Attendance',leave:'Leave Management',compoff:'Comp-Off Management',late:'Late Coming',mispunch:'Mispunch Regularization',holiday:'Holiday Management',config:'Payroll & Policy Configuration',roles:'Role Based Access',audit:'Audit Logs'};
  const V={dashboard:Dashboard,ess:ESS,emp360:Emp360,employees:Employees,shifts:Shifts,training:Training,calculator:Calculator,verify:Verify,attendance:Attendance,leave:Leave,compoff:CompOff,late:LateComing,mispunch:Mispunch,holiday:Holidays,config:Config,roles:Roles,audit:Audit};
  const Cur=canSee(view)?(V[view]||Dashboard):(V[allowedScreens[0]]||ESS);
  const permList=PERM_LIST.filter(p=>permIn(access,role,p));
  return (
    <RoleCtx.Provider value={{role,can,canSee}}>
    <div className="app">
      <aside className="sidebar">
        <div className="brand"><div className="logo"><div className="mark">FL</div><div><h1>Future Link HRMS</h1><div className="sub">Full Prototype</div></div></div></div>
        <nav className="nav">{NAV.map(g=>{const items=g.items.filter(it=>canSee(it.k));if(items.length===0)return null;return (<div key={g.grp}><div className="nav-label">{g.grp}</div>{items.map(it=>(<button key={it.k} className={'nav-item'+(view===it.k?' active':'')} onClick={()=>setView(it.k)}><span className="ic">{it.ic}</span>{it.t}{it.ct>0&&<span className="ct">{it.ct}</span>}</button>))}</div>);})}</nav>
        <div className="nav-foot">Cycle · {db.cycle.start} – {db.cycle.end}<br/>Days: {db.cycle.days} · {db.cycle.approved?<span style={{color:'var(--good)',fontWeight:600}}>Approved ✓</span>:'Draft'}<br/><button onClick={actions.reset} style={{marginTop:8,background:'none',border:'1px solid var(--line)',color:'var(--ink-soft)',borderRadius:7,padding:'5px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}}>↺ Reset data</button></div>
      </aside>
      <main className="main">
        <header className="topbar"><div><div className="crumb">Future Link Consultants</div><h2 className="serif">{titles[view]}</h2></div>
          <div className="topbar-right"><div className="role-pill"><span className="muted" style={{fontSize:11}}>View as</span><select value={role} onChange={e=>setRole(e.target.value)}>{ROLE_LIST.map(r=><option key={r}>{r}</option>)}</select></div><div className="avatar">MK</div></div>
        </header>
        <div className="content">
          <div className="role-banner"><span className="rb-dot"></span><strong>{role}</strong><span className="muted">· can:</span>{permList.length?permList.map(p=><span key={p} className="rb-perm">{PERM_LABELS[p]}</span>):<span className="muted" style={{fontSize:11.5}}>no permissions</span>}<span className="muted" style={{marginLeft:'auto',fontSize:11.5}}>Edit access in Roles &amp; Access · changes apply instantly</span></div>
          <Cur go={setView}/>
        </div>
      </main>
      {toast&&<div className="toast">✓ {toast}</div>}
    </div>
    </RoleCtx.Provider>
  );
}

/* ============ DASHBOARD ============ */
function Dashboard({go}){
  const {db,empRow}=useStore();
  const rows=db.employees.map(e=>empRow(e));
  const liability=rows.reduce((s,r)=>s+r.net,0);
  const grossSum=rows.reduce((s,r)=>s+r.gross,0);
  const incentives=rows.reduce((s,r)=>s+r.incentive,0);
  const bonuses=rows.reduce((s,r)=>s+r.bonus,0);
  const deductions=rows.reduce((s,r)=>s+r.pfEmp+r.esicEmp,0);
  const branches=[...new Set(db.employees.map(e=>e.branch))];
  const queue=[
    ...db.leaves.filter(l=>l.status==='Pending').map(l=>({t:'Leave · '+name(db,l.empId),s:l.type,k:'leave'})),
    ...db.compoff.filter(c=>c.status==='Pending').map(c=>({t:'Comp-off · '+name(db,c.empId),s:c.occasion,k:'compoff'})),
    ...db.late.filter(l=>l.status==='Pending').map(l=>({t:'Late · '+name(db,l.empId),s:l.delay+'m',k:'late'})),
    ...db.mispunch.filter(m=>m.status==='Pending').map(m=>({t:'Mispunch · '+name(db,m.empId),s:m.issue,k:'mispunch'})),
  ].slice(0,6);
  return (
    <div className="grid" style={{gap:18}}>
      <div className="grid g6">
        <Stat lab="Employees" val={db.employees.length} meta="active" color="var(--moss)"/>
        <Stat lab="Net Payroll" val={inr(liability)} meta="payable · live" color="var(--sky)"/>
        <Stat lab="Gross" val={inr(grossSum)} meta="before stat." color="var(--moss-deep)"/>
        <Stat lab="Deductions" val={inr(deductions)} meta="PF + ESIC" color="var(--clay)"/>
        <Stat lab="Incentives" val={inr(incentives)} meta="this cycle" color="var(--gold)"/>
        <Stat lab="Pending" val={queue.length} meta="approvals" color="var(--rose)"/>
      </div>
      <div className="grid g2">
        <div className="card"><div className="card-h"><h3>Net liability by branch</h3><span className="tag">live</span></div>
          {branches.map((b,i)=>{const v=rows.filter(r=>r.branch===b).reduce((s,r)=>s+r.net,0);const max=Math.max(1,...branches.map(bb=>rows.filter(r=>r.branch===bb).reduce((s,r)=>s+r.net,0)));return <div className="bar-row" key={b}><div className="nm">{b}</div><div className="tr"><i style={{width:(v/max*100)+'%',background:i%2?'var(--sky)':'var(--moss)'}}></i></div><div className="vv">{inr(v)}</div></div>;})}
        </div>
        <div className="card"><div className="card-h"><h3>Action queue</h3><button className="btn btn-sm" onClick={()=>go('verify')}>Verify →</button></div>
          {queue.length===0?<div className="empty"><div className="ico">✓</div>All caught up.</div>:queue.map((q,i)=>(<div key={i} className="row-flex" style={{justifyContent:'space-between',padding:'8px 0',borderBottom:i<queue.length-1?'1px solid #eef0f5':'none'}}><div><div style={{fontSize:13.5,fontWeight:500,color:'var(--ink)'}}>{q.t}</div><div style={{fontSize:12,color:'var(--mut)'}}>{q.s}</div></div><button className="btn btn-sm" onClick={()=>go(q.k)}>Review</button></div>))}
        </div>
      </div>
      <div className="card"><div className="card-h"><h3>Salary register — live (Gross → Net)</h3><button className="btn btn-sm" onClick={()=>go('verify')}>Full register →</button></div>
        <div style={{overflowX:'auto'}}><table style={{minWidth:880}}><thead><tr><th>Employee</th><th>Branch</th><th>Monthly</th><th>Payable</th><th>Gross</th><th>PF</th><th>ESIC</th><th>Net Salary</th></tr></thead>
          <tbody>{rows.map(r=>(<tr key={r.id}><td className="strong">{r.name}{r.overridden&&<span className="tag" style={{marginLeft:5,color:'var(--clay)'}}>ovr</span>}<div className="muted mono" style={{fontSize:11}}>{r.id}</div></td><td>{r.branch}</td><td className="mono">{inr(r.monthly)}</td><td style={{textAlign:'center',fontWeight:600,color:'var(--moss)'}}>{r.payable}</td><td className="mono">{inr(r.gross)}</td><td className="mono" style={{color:'var(--rose)'}}>{inr(r.pfEmp)}</td><td className="mono" style={{color:'var(--rose)'}}>{inr(r.esicEmp)}</td><td className="mono strong">{inr(r.net)}</td></tr>))}</tbody>
        </table></div>
      </div>
    </div>
  );
}

/* ============ EMPLOYEE MASTER (full profile) ============ */

          <tbody>{list.map(e=>(<tr key={e.id}>

      <div className="modal-b" style={{paddingTop:4}}>
        {tab==='basic'&&<>
          <div className="row-flex" style={{gap:16,marginBottom:14,alignItems:'flex-start'}}>

          </div>
          <div className="grid g2" style={{gap:'0 16px'}}>{T('dob','Date of Birth')}{T('mobile','Mobile Number')}{T('email','Email Address','',)}{T('emergency','Emergency Contact')}</div>
          {T('addrCurrent','Current Address')}{T('addrPermanent','Permanent Address')}
        </>}
        {tab==='employment'&&<div className="grid g2" style={{gap:'0 16px'}}>
          {T('desig','Designation')}{T('dept','Department',['Counselling','IELTS Training','Documentation','Operations'])}

          {T('mgr','Reporting Manager',['Santosh Sir','S. Nair','A. Verma','CEO Office'])}{T('empType','Employment Type',['Full-Time','Part-Time','Intern','Temporary','Contract'])}

/* ============ TRAINING ============ */

/* ============ PAYABLE DAYS ENGINE ============ */
function Calculator(){
  const [r,setR]=useState({payrollDays:30,leaves:0,paidLeaves:0,late:4,ul:0,sandwich:0,mispunch:3,compoff:1,trainingUnpaid:0,monthly:42000});
  const out=computePayroll(r);
  const set=(k,v)=>setR({...r,[k]:v===''?0:parseFloat(v)});
  const N=(k,label,hint)=>(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #eef0f5'}}><div><div style={{fontSize:13.5,color:'var(--ink)',fontWeight:500}}>{label}</div>{hint&&<div style={{fontSize:11.5,color:'var(--mut)'}}>{hint}</div>}</div><input className="calc-input" type="number" step="0.5" value={r[k]} onChange={e=>set(k,e.target.value)}/></div>);
  const slabs=[[3,0],[6,0.5],[9,1],[12,1.5],[15,2],[18,2.5],[21,3],[24,3.5],[27,4],[99,5]];let prev=0;const slabRows=slabs.map(([hi,d])=>{const lo=prev+1;prev=hi;return{range:hi===99?'28+':lo+'–'+hi,d,active:(r.late>=lo&&r.late<=hi)||(hi===99&&r.late>=28)};});
  return (
    <div className="grid g2" style={{gap:16,alignItems:'start'}}>
      <div className="grid" style={{gap:16}}>
        <div className="card"><div className="card-h"><h3>Inputs — live</h3></div>
          <div style={{display:'flex',gap:12,marginBottom:6}}><label className="fld" style={{flex:1,marginBottom:0}}><span className="l">Payroll Days</span><input className="input mono" type="number" value={r.payrollDays} onChange={e=>set('payrollDays',e.target.value)}/></label><label className="fld" style={{flex:1,marginBottom:0}}><span className="l">Monthly Salary</span><input className="input mono" type="number" value={r.monthly} onChange={e=>set('monthly',e.target.value)}/></label></div>
          <div className="divider" style={{margin:'10px 0'}}></div>
          {N('leaves','Leaves Taken','reduces payable')}{N('paidLeaves','Paid Leave Days','added back')}{N('compoff','Approved Comp-Off','added')}{N('late','Late Comings','feeds slab')}{N('mispunch','Mispunch + Absent','first 2 free, 0.5 each')}{N('ul','Unauthorized Leave','×2')}{N('sandwich','Sandwich Leave','×1 incl off-day')}{N('trainingUnpaid','Unpaid Training Days','deducted')}
        </div>
        <div className="card"><div className="card-h" style={{marginBottom:8}}><h3 style={{fontSize:15}}>Late slab</h3><span className="tag">live</span></div><table className="slabtable"><thead><tr><th>Late count</th><th>Deduction</th></tr></thead><tbody>{slabRows.map((s,i)=><tr key={i} className={s.active?'hl':''}><td>{s.range}</td><td>{s.d}</td></tr>)}</tbody></table></div>
      </div>
      <div className="grid" style={{gap:16,position:'sticky',top:76}}>
        <div className="card" style={{background:'linear-gradient(160deg,#eef5ff,#e8efe6)',borderColor:'#cfe1f7'}}>
          <div style={{fontSize:11,letterSpacing:.7,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Final Payable Days</div>
          <div className="kpi-big" style={{color:'var(--moss-deep)',margin:'8px 0 4px'}}>{out.payable}</div>
          <div style={{fontSize:13,color:'var(--ink-soft)'}}>of {r.payrollDays} payroll days</div><div className="divider"></div>
          <div className="grid g3" style={{gap:10}}>
            <div><div style={{fontSize:10,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Daily</div><div className="serif" style={{fontSize:18,fontWeight:600}}>{inr(out.daily)}</div></div>
            <div><div style={{fontSize:10,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Gross</div><div className="serif" style={{fontSize:18,fontWeight:600}}>{inr(out.gross)}</div></div>
            <div><div style={{fontSize:10,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Net</div><div className="serif" style={{fontSize:18,fontWeight:600,color:'var(--moss-deep)'}}>{inr(out.net)}</div></div>
          </div>
        </div>
        <div className="card"><div className="card-h" style={{marginBottom:10}}><h3 style={{fontSize:15}}>How it computed</h3></div>
          <div className="formula-box">Payable = {r.payrollDays}<span className="neg"> − {r.leaves}</span> + {r.paidLeaves} + {out.compoff}<br/><span style={{paddingLeft:62}} className="neg">− {out.K} (late) − {r.ul*2} (UL)</span><br/><span style={{paddingLeft:62}} className="neg">− {r.sandwich} (sand) − {out.N} (mis) − {out.trainingUnpaid} (train)</span><br/><span style={{borderTop:'1px solid #3a4a42',display:'block',marginTop:6,paddingTop:6}}>= <span className="res">{out.payable} days</span></span><br/>Gross = {inr(out.daily)} × {out.payable} = <span className="res">{inr(out.gross)}</span><br/>Net = Gross + inc/bonus − PF({inr(out.pfEmp)}) − ESIC({inr(out.esicEmp)}) = <span className="res">{inr(out.net)}</span></div>
        </div>
      </div>
    </div>
  );
}

/* ============ PAYROLL VERIFICATION (Gross→Net) ============ */
function Verify(){
  const {db,actions,empRow}=useStore();const {can}=useRole();
  const [branch,setBranch]=useState('All');
  const [ovrEmp,setOvrEmp]=useState(null);
  const branches=['All',...new Set(db.employees.map(e=>e.branch))];
  const rows=db.employees.filter(e=>branch==='All'||e.branch===branch).map(e=>empRow(e));
  const totG=rows.reduce((s,r)=>s+r.gross,0),totN=rows.reduce((s,r)=>s+r.net,0);
  return (
    <div className="grid" style={{gap:16}}>
      <div className="card-h">
        <div className="row-flex"><select className="input" style={{width:140}} value={branch} onChange={e=>setBranch(e.target.value)}>{branches.map(b=><option key={b}>{b}</option>)}</select><span className="tag">{db.cycle.start} – {db.cycle.end} · {db.cycle.days}d</span>{db.cycle.approved&&<span className="badge b-approved">Approved & Locked</span>}</div>
        <div className="row-flex">{can('export')&&['Excel','CSV','PDF'].map(f=><button key={f} className="btn btn-sm" onClick={()=>exportRows(rows,f,db)}>↓ {f}</button>)}{can('approve')&&(db.cycle.approved?<button className="btn btn-sm" onClick={actions.reopenPayroll}>Reopen</button>:<button className="btn btn-primary btn-sm" onClick={actions.approvePayroll}>Approve Payroll</button>)}{!can('export')&&!can('approve')&&<span className="muted" style={{fontSize:12}}>read-only access</span>}</div>
      </div>
      <div className="card" style={{padding:0,overflow:'auto'}}>
        <table style={{minWidth:1500}}><thead><tr><th>Employee</th><th>PF No.</th><th>Branch</th><th>Mis+Abs</th><th>Late</th><th>Leaves</th><th>W/Off</th><th>Paid Lv</th><th>C-Off</th><th>UL</th><th>Sand</th><th>Train</th><th>L-Ded</th><th>M-Ded</th><th>Payable</th><th>Daily</th><th>Gross</th><th>Inc</th><th>Bonus</th><th>PF</th><th>ESIC</th><th>Net Salary</th><th></th></tr></thead>
          <tbody>{rows.map(r=>(<tr key={r.id}>
            <td className="strong">{r.name}{r.overridden&&<span className="tag" style={{marginLeft:4,color:'var(--clay)'}}>ovr</span>}<div className="muted mono" style={{fontSize:10}}>{r.id}</div></td>
            <td className="mono" style={{fontSize:10}}>{r.pf}</td><td>{r.branch}</td>
            <td style={{textAlign:'center',color:r.mispunch?'var(--clay)':'inherit'}}>{r.mispunch}</td><td style={{textAlign:'center'}}>{r.late}</td><td style={{textAlign:'center'}}>{r.leaves}</td><td style={{textAlign:'center'}}>{r.wOff}</td><td style={{textAlign:'center'}}>{r.paidLeaves}</td><td style={{textAlign:'center',color:r.compoff?'var(--good)':'inherit'}}>{r.compoff}</td><td style={{textAlign:'center',color:r.ul?'var(--rose)':'inherit'}}>{r.ul}</td><td style={{textAlign:'center',color:r.sandwich?'var(--rose)':'inherit'}}>{r.sandwich}</td><td style={{textAlign:'center',color:r.trainingUnpaid?'var(--rose)':'inherit'}}>{r.trainingUnpaid}</td>
            <td style={{textAlign:'center'}}>{r.K}</td><td style={{textAlign:'center'}}>{r.N}</td><td style={{textAlign:'center',fontWeight:700,color:'var(--moss)'}}>{r.payable}</td>
            <td className="mono" style={{fontSize:11}}>{inr(r.daily)}</td><td className="mono">{inr(r.gross)}</td><td className="mono">{inr(r.incentive)}</td><td className="mono">{inr(r.bonus)}</td><td className="mono" style={{color:'var(--rose)'}}>{inr(r.pfEmp)}</td><td className="mono" style={{color:'var(--rose)'}}>{inr(r.esicEmp)}</td><td className="mono strong">{inr(r.net)}</td>
            <td>{can('override')?<button className="btn btn-sm" disabled={db.cycle.approved} onClick={()=>setOvrEmp(r)}>Ovr</button>:<span className="muted" style={{fontSize:11}}>—</span>}</td>
          </tr>))}</tbody>
          <tfoot><tr style={{borderTop:'2px solid var(--line)'}}><td className="strong" colSpan="16" style={{textAlign:'right'}}>Totals</td><td className="mono strong">{inr(totG)}</td><td colSpan="4"></td><td className="mono strong" style={{color:'var(--moss)'}}>{inr(totN)}</td><td></td></tr></tfoot>
        </table>
      </div>
      <div className="card" style={{background:'#f1f5f1',borderColor:'#cfe1f7'}}><div style={{fontSize:13,color:'var(--ink-soft)'}}><strong>Payable</strong> = Days − Leaves + PaidLeaves + CompOff − LateDed − (UL×2) − Sandwich − MispunchDed − UnpaidTraining (matches Excel). <strong>Gross</strong> = Daily × Payable. <strong>Net</strong> = Gross + Incentive + Bonus − PF − ESIC.</div></div>
      {ovrEmp&&<OverrideModal emp={ovrEmp} close={()=>setOvrEmp(null)}/>}
    </div>
  );
}
function OverrideModal({emp,close}){
  const {actions,deriveInputs,db}=useStore();
  const auto=deriveInputs({...emp,override:{on:false}},db);
  const [f,setF]=useState({on:true,late:emp.late,mispunch:emp.mispunch,leaves:emp.leaves,wOff:emp.wOff,paidLeaves:emp.paidLeaves,compoff:emp.compoff,ul:emp.ul,sandwich:emp.sandwich});
  const set=(k,v)=>setF({...f,[k]:v===''?0:parseFloat(v)});
  const calc=computePayroll({payrollDays:db.cycle.days,monthly:emp.monthly,basic:emp.basic,incentive:emp.incentive,bonus:emp.bonus,pfApplicable:emp.pfApplicable,esicApplicable:emp.esicApplicable,trainingUnpaid:emp.trainingUnpaid,...f});
  const Row=(k,label)=>(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #eef0f5'}}><div><div style={{fontSize:13,fontWeight:500}}>{label}</div><div style={{fontSize:11,color:'var(--mut)'}}>auto: {auto[k]}</div></div><input className={'calc-input'+(f[k]!==auto[k]?' ovr':'')} type="number" step="0.5" value={f[k]} onChange={e=>set(k,e.target.value)}/></div>);
  return (
    <div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-h"><h3>Override — {emp.name}</h3><button className="x" onClick={close}>×</button></div>
      <div className="modal-b"><div style={{fontSize:12.5,color:'var(--ink-soft)',marginBottom:10}}>Auto = attendance roll-up + approvals. Override any field (gold = changed).</div>
        {Row('late','Late Comings')}{Row('mispunch','Mispunch + Absent')}{Row('leaves','Leaves')}{Row('paidLeaves','Paid Leaves')}{Row('compoff','Comp-Off')}{Row('ul','Unauthorized Leave')}{Row('sandwich','Sandwich Leave')}
        <div className="card" style={{marginTop:12,background:'#eef5ff',borderColor:'#cfe1f7',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:11,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Payable</div><div className="serif" style={{fontSize:22,fontWeight:600,color:'var(--moss-deep)'}}>{calc.payable}</div></div><div style={{textAlign:'right'}}><div style={{fontSize:11,textTransform:'uppercase',color:'var(--mut)',fontWeight:600}}>Net Salary</div><div className="serif" style={{fontSize:22,fontWeight:600,color:'var(--moss-deep)'}}>{inr(calc.net)}</div></div></div>
      </div>
      <div className="modal-f"><button className="btn btn-bad" onClick={()=>{actions.setOverride(emp.id,{on:false});close();}}>Clear</button><button className="btn" onClick={close}>Cancel</button><button className="btn btn-primary" onClick={()=>{actions.setOverride(emp.id,f);close();}}>Apply Override</button></div>
    </div></div>
  );
}
function exportRows(rows,fmt,db){
  const headers=['Employee','ID','PF','ESIC','Branch','MisAbs','Late','Leaves','WOff','PaidLv','CompOff','UL','Sandwich','UnpaidTrain','LateDed','MisDed','Payable','Daily','Gross','Incentive','Bonus','PF','ESICded','Net'];
  const data=rows.map(r=>[r.name,r.id,r.pf,r.esic,r.branch,r.mispunch,r.late,r.leaves,r.wOff,r.paidLeaves,r.compoff,r.ul,r.sandwich,r.trainingUnpaid,r.K,r.N,r.payable,r.daily,r.gross,r.incentive,r.bonus,r.pfEmp,r.esicEmp,r.net]);
  if(fmt==='PDF'){const w=window.open('','_blank');w.document.write('<h2>Salary Register — '+db.cycle.start+' to '+db.cycle.end+'</h2><table border=1 cellpadding=5 style="border-collapse:collapse;font:11px sans-serif"><tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>'+data.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</table>');w.document.close();w.print();return;}
  const sep=fmt==='CSV'?',':'\t';const csv=[headers.join(sep),...data.map(r=>r.join(sep))].join('\n');
  const blob=new Blob([csv],{type:'text/'+(fmt==='CSV'?'csv':'tab-separated-values')});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='salary_register.'+(fmt==='CSV'?'csv':'xls');a.click();
}
</script>

<script type="text/babel">
var {useState, useEffect} = React;

/* ============ ATTENDANCE (break + OT) ============ */
function Attendance(){
  const {db,actions,empRow}=useStore();const {can}=useRole();
  const [empId,setEmpId]=useState(db.employees[0].id);
  const emp=db.employees.find(e=>e.id===empId)||db.employees[0];
  const shift=db.shifts.find(s=>s.id===emp.shiftId)||db.shifts[0];
  const att=db.attendance[empId]||[];
  const r=empRow(emp);
  const ru=rollup(att,shift);
  const mng=can('manageEmp')||can('approve');
  // today's row, if present
  const now=new Date();const todayDate=String(now.getDate()).padStart(2,'0')+' '+now.toLocaleString('en-US',{month:'short'});
  const todayIdx=att.findIndex(a=>a.date===todayDate);
  return (
    <div className="grid" style={{gap:16}}>
      <div className="card-h"><div className="seg">{db.employees.map(e=><button key={e.id} className={empId===e.id?'on':''} onClick={()=>setEmpId(e.id)}>{e.name.split(' ')[0]}</button>)}</div><span className="tag">{emp.name} · {shift.name} ({shift.login}–{shift.logout}, grace {shift.grace}m)</span></div>
      <PunchStation empId={empId} emp={emp} shift={shift} att={att} todayIdx={todayIdx} todayDate={todayDate}/>
      <div className="grid g6">
        <Stat lab="Working" val={ru.working} meta="present days" color="var(--moss)"/>
        <Stat lab="Late (>grace)" val={ru.lateCount} meta="feeds slab" color="var(--clay)"/>
        <Stat lab="Mispunch" val={ru.mispunch} meta="raw count" color="var(--rose)"/>
        <Stat lab="Break total" val={fmtDur(ru.breakMin)} meta="this cycle" color="var(--sky)"/>
        <Stat lab="Overtime" val={fmtDur(ru.otMin)} meta="beyond target" color="var(--gold)"/>
        <Stat lab="Payable" val={r.payable} meta="after rules" color="var(--moss-deep)"/>
      </div>
      <div className="card" style={{padding:0,overflow:'auto'}}>
        <div className="card-h" style={{padding:'14px 16px 0',marginBottom:0}}><h3 style={{fontSize:15}}>Daily punch register</h3>{mng&&todayIdx<0&&<button className="btn btn-sm btn-primary" onClick={()=>actions.addToday(empId)}>+ Add today ({todayDate})</button>}</div>
        <table style={{minWidth:1120}}><thead><tr><th>Date</th><th>Day</th><th>In</th><th>Out</th><th>Break In</th><th>Break Out</th><th>Break</th><th>Net Hrs</th><th>Late</th><th>OT</th><th>Mispunch</th><th>Status</th></tr></thead>
          <tbody>{att.map((a,i)=>{const m=dayMetrics(a,shift);const isToday=a.date===todayDate;return (<tr key={i} style={isToday?{background:'#f3f8ff'}:{}}>
            <td className="strong">{a.date}{isToday&&<span className="tag" style={{marginLeft:5,color:'var(--moss)'}}>today</span>}</td><td>{a.day}</td>
            <td><EditCell value={a.in||'—'} onSave={v=>actions.setPunch(empId,i,{in:v==='—'?null:v})}/></td>
            <td><EditCell value={a.out||'—'} onSave={v=>actions.setPunch(empId,i,{out:v==='—'?null:v})}/></td>
            <td><EditCell value={a.bStart||'—'} onSave={v=>actions.setPunch(empId,i,{bStart:v==='—'?null:v})}/></td>
            <td><EditCell value={a.bEnd||'—'} onSave={v=>actions.setPunch(empId,i,{bEnd:v==='—'?null:v})}/></td>
            <td className="mono" style={{fontSize:11.5}}>{fmtDur(m.breakMin)}</td>
            <td className="mono" style={{fontSize:11.5}}>{fmtDur(m.net)}</td>
            <td style={{color:m.lateBeyondGrace?'var(--clay)':'inherit',fontWeight:m.lateBeyondGrace?600:400}}>{m.lateMin?m.lateMin+'m':'—'}</td>
            <td className="mono" style={{fontSize:11.5,color:m.otMin?'var(--gold)':'inherit'}}>{m.otMin?fmtDur(m.otMin):'—'}</td>
            <td><button className={'chip-toggle'+(a.mispunch?' on':'')} onClick={()=>actions.setPunch(empId,i,{mispunch:!a.mispunch})}>{a.mispunch?'Yes':'No'}</button></td>
            <td><select className="input" style={{padding:'5px 7px',width:150}} value={a.status} onChange={e=>actions.setPunch(empId,i,{status:e.target.value})}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></td>
          </tr>);})}</tbody>
        </table>
      </div>
      <div className="card" style={{background:'#fff7ed',borderColor:'#fed7aa'}}><div style={{fontSize:13,color:'var(--ink-soft)'}}><strong>How it works:</strong> use the punch station above to Check In / Break / Check Out — it stamps the live time and auto-sets the day's status (late beyond {shift.halfDayAfter||60}m → Half Day, only one punch → Mispunch, none → Absent). You can still click any cell to correct a time. Break = Break Out − Break In · Net = Out − In − Break · OT = Net beyond shift target. Late counts only beyond grace ({shift.grace}m). Every punch rolls into payable days instantly.{r.overridden&&<span style={{color:'var(--clay)'}}> Override active — roll-up paused for payroll.</span>}</div></div>
    </div>
  );
}
function PunchStation({empId,emp,shift,att,todayIdx,todayDate}){
  const {actions}=useStore();
  const [clock,setClock]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return ()=>clearInterval(t);},[]);
  const today=todayIdx>=0?att[todayIdx]:null;
  const hhmmss=clock.toLocaleTimeString('en-IN',{hour12:false});
  const checkedIn=today&&today.in, checkedOut=today&&today.out;
  const onBreak=today&&today.bStart&&!today.bEnd;
  const m=today?dayMetrics(today,shift):null;
  const Btn=({field,label,color,disabled,done,doneVal})=>(
    <button onClick={()=>actions.punch(empId,todayIdx,field)} disabled={disabled}
      style={{flex:1,minWidth:120,border:'none',borderRadius:12,padding:'14px 12px',cursor:disabled?'not-allowed':'pointer',
        background:done?'#eef5ff':disabled?'#f0f1f4':color,color:done?'var(--ink-soft)':disabled?'var(--mut)':'#fff',
        fontFamily:'inherit',fontWeight:600,fontSize:14,boxShadow:disabled||done?'none':'0 4px 12px '+color+'55',transition:'.15s'}}>
      <div style={{fontSize:18,marginBottom:3}}>{done?'✓':''} {label}</div>
      <div style={{fontSize:12,fontWeight:500,opacity:.85}}>{done?'at '+doneVal:disabled?'—':'tap to stamp'}</div>
    </button>
  );
  return (
    <div className="card" style={{background:'linear-gradient(135deg,#1a2233,#1e4e7e)',color:'#fff',border:'none'}}>
      <div className="row-flex" style={{justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div><div style={{fontSize:11,letterSpacing:1,textTransform:'uppercase',opacity:.7,fontWeight:600}}>Punch Station · {emp.name.split(' ')[0]}</div>
          <div className="mono" style={{fontFamily:'JetBrains Mono',fontSize:30,fontWeight:600,marginTop:2}}>{hhmmss}</div>
          <div style={{fontSize:12,opacity:.8}}>{clock.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'})} · Shift {shift.login}–{shift.logout}</div>
        </div>
        <div style={{textAlign:'right'}}>
          {today?<>
            <div style={{fontSize:11,opacity:.7,textTransform:'uppercase',letterSpacing:.5,fontWeight:600}}>Today</div>
            <div style={{fontSize:15,fontWeight:600,marginTop:2}}>{today.status}{today.mispunch?' · mispunch':''}</div>
            <div className="mono" style={{fontSize:12,opacity:.85}}>Net {fmtDur(m&&m.net)} · {m&&m.lateMin?('late '+m.lateMin+'m'):'on time'}</div>
          </>:<div style={{fontSize:12.5,opacity:.85,maxWidth:200}}>No row for {todayDate} yet. Use “Add today” below the table to start punching.</div>}
        </div>
      </div>
      {today&&<div className="row-flex" style={{gap:10}}>
        <Btn field="in" label="Check In" color="#16a06a" disabled={!!checkedIn} done={!!checkedIn} doneVal={checkedIn}/>
        <Btn field="bStart" label="Break Start" color="#e0a82e" disabled={!checkedIn||!!checkedOut||!!today.bStart} done={!!today.bStart} doneVal={today.bStart}/>
        <Btn field="bEnd" label="Break End" color="#e8732e" disabled={!onBreak} done={!!today.bEnd} doneVal={today.bEnd}/>
        <Btn field="out" label="Check Out" color="#e5484d" disabled={!checkedIn||!!checkedOut} done={!!checkedOut} doneVal={checkedOut}/>
      </div>}
    </div>
  );
}
function EditCell({value,onSave}){
  const [editing,setEditing]=useState(false);const [v,setV]=useState(value);
  useEffect(()=>setV(value),[value]);
  if(editing)return <input className="calc-input" style={{width:72}} value={v} autoFocus onChange={e=>setV(e.target.value)} onBlur={()=>{setEditing(false);onSave(v);}} onKeyDown={e=>{if(e.key==='Enter'){setEditing(false);onSave(v);}}}/>;
  return <span className="punch-cell" onClick={()=>setEditing(true)}>{value}</span>;
}

/* ============ LEAVE ============ */
function Leave(){
  const {db,actions}=useStore();const {can}=useRole();const [open,setOpen]=useState(false);
  return (<div className="grid" style={{gap:16}}>
    <div className="card-h"><span className="tag">6-Day: 18/yr (1.5/mo) · 5-Day: 10/yr · Sick cap 8 · final approval: HR</span>{can('apply')&&<button className="btn btn-primary" onClick={()=>setOpen(true)}>+ Apply Leave</button>}</div>
    <div className="card" style={{padding:0,overflow:'auto'}}>{db.leaves.length===0?<div className="empty"><div className="ico">⊟</div>No leave requests.</div>:
      <table style={{minWidth:800}}><thead><tr><th>Ref</th><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Doc</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>{db.leaves.map(l=>(<tr key={l.id}><td className="mono strong" style={{fontSize:12}}>{l.id}</td><td>{name(db,l.empId)}<div className="muted" style={{fontSize:11.5}}>{l.reason}</div></td><td>{l.type}</td><td>{l.from}{l.from!==l.to?' – '+l.to:''}</td><td style={{textAlign:'center'}}>{l.days}</td><td>{l.doc?<span className="tag">📎</span>:<span className="muted">—</span>}</td><td>{sBadge(l.status)}</td><td><div className="row-flex">{can('approve')?(l.status==='Pending'?<><button className="btn btn-sm btn-good" onClick={()=>actions.setLeaveStatus(l.id,'Approved')}>Approve</button><button className="btn btn-sm btn-bad" onClick={()=>actions.setLeaveStatus(l.id,'Rejected')}>Reject</button></>:<button className="btn btn-sm" onClick={()=>actions.setLeaveStatus(l.id,'Pending')}>Reopen</button>):<span className="muted" style={{fontSize:11.5}}>view only</span>}{can('approve')&&<button className="btn btn-sm btn-ghost btn-bad" onClick={()=>actions.deleteLeave(l.id)}>✕</button>}</div></td></tr>))}</tbody></table>}
    </div>
    {open&&<LeaveModal close={()=>setOpen(false)}/>}
  </div>);
}
function LeaveModal({close}){
  const {db,actions}=useStore();
  const [f,setF]=useState({empId:db.employees[0].id,type:'Annual Leave',from:'',to:'',days:1,reason:'',doc:false});
  const [err,setErr]=useState({});const set=(k,v)=>setF({...f,[k]:v});
  const save=()=>{const e={};if(!f.from)e.from='Required';if(!f.reason.trim())e.reason='Reason required';if(!f.days||f.days<=0)e.days='> 0';setErr(e);if(Object.keys(e).length)return;actions.addLeave({...f,to:f.to||f.from,days:parseFloat(f.days)});close();};
  return (<div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-h"><h3>Apply for Leave</h3><button className="x" onClick={close}>×</button></div>
    <div className="modal-b">
      <label className="fld"><span className="l">Employee</span><select className="input" value={f.empId} onChange={e=>set('empId',e.target.value)}>{db.employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></label>
      <label className="fld"><span className="l">Leave Type</span><select className="input" value={f.type} onChange={e=>set('type',e.target.value)}>{['Annual Leave','Sick Leave','Casual Leave','Comp-Off Leave','Special Leave','Unpaid Leave'].map(o=><option key={o}>{o}</option>)}</select></label>
      <div className="grid g3" style={{gap:'0 14px'}}><label className="fld"><span className="l">From</span><input className={'input'+(err.from?' err':'')} type="date" value={f.from} onChange={e=>set('from',e.target.value)}/></label><label className="fld"><span className="l">To</span><input className="input" type="date" value={f.to} onChange={e=>set('to',e.target.value)}/></label><label className="fld"><span className="l">Days</span><input className={'input mono'+(err.days?' err':'')} type="number" step="0.5" value={f.days} onChange={e=>set('days',e.target.value)}/></label></div>
      <label className="fld"><span className="l">Reason</span><textarea className={'input'+(err.reason?' err':'')} rows="2" value={f.reason} onChange={e=>set('reason',e.target.value)}></textarea>{err.reason&&<div className="errmsg">{err.reason}</div>}</label>
      <label className="row-flex" style={{fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={f.doc} onChange={e=>set('doc',e.target.checked)}/> Document attached (medical/proof)</label>
    </div>
    <div className="modal-f"><button className="btn" onClick={close}>Cancel</button><button className="btn btn-primary" onClick={save}>Submit</button></div>
  </div></div>);
}

/* ============ COMP-OFF ============ */
function CompOff(){
  const {db,actions}=useStore();const {can}=useRole();const [open,setOpen]=useState(false);
  return (<div className="grid" style={{gap:16}}>
    <div className="card-h"><span className="tag">Flow: Employee → Manager → HR · approved adds to payable</span>{can('apply')&&<button className="btn btn-primary" onClick={()=>setOpen(true)}>+ Request Comp-Off</button>}</div>
    <div className="grid g3"><Stat lab="Approved" val={db.compoff.filter(c=>c.status==='Approved').length} meta="in payroll" color="var(--moss)"/><Stat lab="Pending" val={db.compoff.filter(c=>c.status==='Pending').length} meta="awaiting" color="var(--clay)"/><Stat lab="Total" val={db.compoff.length} meta="requests" color="var(--sky)"/></div>
    <div className="card" style={{padding:0,overflow:'auto'}}>{db.compoff.length===0?<div className="empty"><div className="ico">⇄</div>No comp-off requests.</div>:
      <table style={{minWidth:680}}><thead><tr><th>Ref</th><th>Employee</th><th>Date Worked</th><th>Occasion</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>{db.compoff.map(c=>(<tr key={c.id}><td className="mono strong" style={{fontSize:12}}>{c.id}</td><td>{name(db,c.empId)}</td><td>{c.worked}</td><td style={{fontSize:12.5}}>{c.occasion}<div className="muted" style={{fontSize:11}}>{c.reason}</div></td><td>{sBadge(c.status)}</td><td><div className="row-flex">{can('approve')?(c.status==='Pending'?<><button className="btn btn-sm btn-good" onClick={()=>actions.setCompoffStatus(c.id,'Approved')}>Approve</button><button className="btn btn-sm btn-bad" onClick={()=>actions.setCompoffStatus(c.id,'Rejected')}>Reject</button></>:<button className="btn btn-sm" onClick={()=>actions.setCompoffStatus(c.id,'Pending')}>Reopen</button>):<span className="muted" style={{fontSize:11.5}}>view only</span>}{can('approve')&&<button className="btn btn-sm btn-ghost btn-bad" onClick={()=>actions.deleteCompoff(c.id)}>✕</button>}</div></td></tr>))}</tbody></table>}
    </div>
    {open&&<CompoffModal close={()=>setOpen(false)}/>}
  </div>);
}
function CompoffModal({close}){
  const {db,actions}=useStore();const [f,setF]=useState({empId:db.employees[0].id,worked:'',occasion:'Worked on Weekly Off',reason:''});const [err,setErr]=useState({});
  const save=()=>{if(!f.worked){setErr({worked:'Required'});return;}actions.addCompoff(f);close();};
  return (<div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="modal-h"><h3>Request Comp-Off</h3><button className="x" onClick={close}>×</button></div>
    <div className="modal-b">
      <label className="fld"><span className="l">Employee</span><select className="input" value={f.empId} onChange={e=>setF({...f,empId:e.target.value})}>{db.employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></label>

/* ============ ROLES ============ */

    if(p!=='configure')return false;

    <div className="pill-tab">
      <button className={tab==='perms'?'on':''} onClick={()=>setTab('perms')}>Action Permissions</button>
      <button className={tab==='screens'?'on':''} onClick={()=>setTab('screens')}>Screen Access</button>

        <tbody>{ROLE_LIST.map(r=>(<tr key={r} style={r===role?{background:'#f3f8ff'}:{}}><td className="strong">{r}{r===role&&<span className="tag" style={{marginLeft:6,color:'var(--moss)'}}>you</span>}</td>{PERM_LIST.map(p=>{const on=!!access[r].perms[p];const locked=wouldLockOut(r,p);return <td key={p} style={{textAlign:'center'}}><Dot on={on} locked={locked} onClick={()=>actions.setPerm(r,p,!on)}/></td>;})}</tr>))}</tbody>
      </table></div>
    :
      <div className="card" style={{padding:0,overflow:'auto'}}><table style={{minWidth:900}}><thead><tr><th>Role</th>{ALL_SCREENS.map(s=><th key={s} style={{textAlign:'center',writingMode:'vertical-rl',transform:'rotate(180deg)',height:78,padding:'4px 2px'}}>{s}</th>)}</tr></thead>
        <tbody>{ROLE_LIST.map(r=>(<tr key={r} style={r===role?{background:'#f3f8ff'}:{}}><td className="strong">{r}{r===role&&<span className="tag" style={{marginLeft:6,color:'var(--moss)'}}>you</span>}</td>{ALL_SCREENS.map(s=>{const on=!!access[r].screens[s];return <td key={s} style={{textAlign:'center'}}><Dot on={on} onClick={()=>actions.setScreen(r,s,!on)}/></td>;})}</tr>))}</tbody>
      </table></div>

      {editable&&<button className="btn" onClick={()=>{if(confirm('Reset all roles to default access?'))actions.resetAccess();}}>↺ Reset to defaults</button>}
    </div>
    <div className="card" style={{background:'#fff7ed',borderColor:'#fed7aa'}}><div style={{fontSize:13,color:'var(--ink-soft)'}}>Changes persist (saved with your data) and are recorded in Audit Logs. The last Configure permission is locked so you can't accidentally lock everyone out — use Reset to defaults to recover.</div></div>
  </div>);
}

/* ============ AUDIT ============ */
function Audit(){
  const {db}=useStore();const [q,setQ]=useState('');
  const rows=db.audit.filter(a=>(a.action+a.target+a.user).toLowerCase().includes(q.toLowerCase()));
  return (<div className="grid" style={{gap:16}}>
    <div className="card-h"><span className="tag">{db.audit.length} entries · live</span><input className="input" style={{maxWidth:240}} placeholder="Search logs…" value={q} onChange={e=>setQ(e.target.value)}/></div>
    <div className="card" style={{padding:0,overflow:'auto'}}><table style={{minWidth:760}}><thead><tr><th>User</th><th>Action</th><th>Target</th><th>Previous</th><th>New</th><th>When</th></tr></thead><tbody>{rows.map((a,i)=>(<tr key={i}><td className="strong">{a.user}</td><td><span className="tag">{a.action}</span></td><td style={{fontSize:12.5}}>{a.target}</td><td className="muted mono" style={{fontSize:12}}>{a.prev}</td><td className="mono" style={{fontSize:12,color:'var(--moss)'}}>{a.next}</td><td className="muted mono" style={{fontSize:12}}>{a.time}</td></tr>))}</tbody></table></div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<StoreProvider><Shell/></StoreProvider>);
</script>
</body>
</html>
