    <script>
      (function () {
        function isPreview() {
          try {
            if (/lovable\.(dev|app)/i.test(location.hostname)) return true;
            if (window.self !== window.top) return true;
          } catch (e) {
            return true;
          }
          return false;
        }
        function goAuth() {
          window.location.replace("/auth" + location.search + location.hash);
        }
        try {
          var path = location.pathname;
          if (path !== "/" && path !== "") return;

          var hasSession = Object.keys(localStorage).some(function (k) {
            return k.indexOf("sb-") === 0 && k.indexOf("-auth-token") > 0 && localStorage.getItem(k);
          });

          if (isPreview()) {
            if (!hasSession) goAuth();
            return;
          }

          if (!hasSession) goAuth();
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("fl-theme-v2");
          var mode = "system";
          if (raw) mode = JSON.parse(raw).mode || "system";
          var dark =
            mode === "dark" ||
            (mode !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var el = document.documentElement;
          if (dark) {
            el.classList.add("dark");
            el.setAttribute("data-theme", "dark");
          } else {
            el.classList.remove("dark");
            el.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>

      @keyframes flc-spin { to { transform: rotate(360deg); } }

  <body>
    <div id="root">
      <div
        id="flc-boot-splash"
        style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f8fa;color:#1a2332;font-family:system-ui,sans-serif"
      >
        <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
          <div style="width:32px;height:32px;border-radius:50%;border:2px solid #005daa;border-top-color:transparent;animation:flc-spin 0.8s linear infinite"></div>
          <p id="flc-boot-msg" style="margin:0;font-size:14px;color:#5a6a7a">Loading Future Link…</p>
          <p style="margin:8px 0 0;font-size:12px;color:#8a96a3"><a href="/auth" style="color:#005daa">Go to sign in</a></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/entry.ts"></script>
    <script>
      (function () {
        function hasSession() {
          try {
            return Object.keys(localStorage).some(function (k) {
              return k.indexOf("sb-") === 0 && k.indexOf("-auth-token") > 0 && localStorage.getItem(k);
            });
          } catch (e) {
            return false;
          }
        }
        function isPreview() {
          try {
            if (/lovable\.(dev|app)/i.test(location.hostname)) return true;
            if (window.self !== window.top) return true;
          } catch (e) {
            return true;
          }
          return false;
        }
        setTimeout(function () {
          try {
            var msg = document.getElementById("flc-boot-msg");
            var splashStillVisible = !!document.getElementById("flc-boot-splash");
            var bootPayload = {
              sessionId: "c5260a",
              location: "index.html:boot8s",
              message: "8s boot timer fired",
              data: {
                splashStillVisible: splashStillVisible,
                hasSession: hasSession(),
                isPreview: isPreview(),
                bootMsg: msg ? msg.textContent : null,
                path: location.pathname,
              },
              hypothesisId: "H1",
              timestamp: Date.now(),
              runId: "pre-fix",
            };
            try {
              var prev = JSON.parse(sessionStorage.getItem("flc-debug-c5260a") || "[]");
              prev.push(bootPayload);
              sessionStorage.setItem("flc-debug-c5260a", JSON.stringify(prev.slice(-80)));
            } catch (e) {}
            fetch("http://127.0.0.1:7861/ingest/bda2c8c0-2fff-4fe0-b6f7-be98b8c0ed66", {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-Debug-Session-Id": "c5260a" },
              body: JSON.stringify(bootPayload),
            }).catch(function () {});
            if (!msg || msg.textContent.indexOf("Loading Future Link") < 0) return;
            if (hasSession()) {
              msg.textContent = isPreview()
                ? "Loading workspace — preview may take up to a minute…"
                : "Loading workspace…";
              return;
            }
            window.location.replace("/auth" + location.search + location.hash);
          } catch (e) {}
        }, 8000);

        function showPreviewRecovery(reason) {
          var splash = document.getElementById("flc-boot-splash");
          if (!splash) return;
          var wrap = splash.querySelector("div");
          if (!wrap || document.getElementById("flc-boot-recovery")) return;
          var box = document.createElement("div");
          box.id = "flc-boot-recovery";
          box.style.cssText = "margin-top:20px;text-align:center;max-width:360px";
          box.innerHTML =
            '<p style="margin:0 0 12px;font-size:13px;color:#5a6a7a;line-height:1.5">' +
            reason +
            "</p>" +
            '<button type="button" id="flc-boot-reload" style="display:block;width:100%;margin:0 0 8px;padding:10px 16px;border-radius:8px;border:none;background:#005daa;color:#fff;font-weight:600;cursor:pointer">Reload page</button>' +
            '<button type="button" id="flc-boot-clear" style="display:block;width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d0d7de;background:#fff;color:#1a2332;font-weight:500;cursor:pointer">Clear session &amp; sign in</button>';
          wrap.appendChild(box);
          document.getElementById("flc-boot-reload").onclick = function () {
            window.location.reload();
          };
          document.getElementById("flc-boot-clear").onclick = function () {
            try {
              Object.keys(localStorage).forEach(function (k) {
                if (k.indexOf("sb-") === 0 && k.indexOf("-auth-token") > 0) localStorage.removeItem(k);
              });
            } catch (e) {}
            window.location.replace("/auth" + location.search + location.hash);
          };
        }

        setTimeout(function () {
          try {
            if (!isPreview()) return;
            if (!document.getElementById("flc-boot-splash")) return;
            showPreviewRecovery(
              "Preview is still loading after 90 seconds. The app shell may be blocked — try reload first.",
            );
          } catch (e) {}
        }, 90000);
      })();
    </script>
  </body>
